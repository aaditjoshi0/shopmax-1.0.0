<!DOCTYPE html>
<html lang="en">
<head>
    <title>ShopMax &mdash; Cart</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Mukta:300,400,700">
    <link rel="stylesheet" href="fonts/icomoon/style.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/magnific-popup.css">
    <link rel="stylesheet" href="css/jquery-ui.css">
    <link rel="stylesheet" href="css/owl.carousel.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">
    <link rel="stylesheet" href="css/aos.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>
<div class="site-wrap">
    <div data-sm-navbar></div>
    <div class="bg-light py-3">
        <div class="container">
            <div class="row">
                <div class="col-md-12 mb-0"><a href="index.html">Home</a> <span class="mx-2 mb-0">/</span> <strong class="text-black">Cart</strong></div>
            </div>
        </div>
    </div>
    <div class="site-section">
        <div class="container">
            <div class="row mb-5">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-body p-0">
                            <div id="sm-cart-loading" class="text-center py-5 text-muted">Loading cart...</div>
                            <div id="sm-cart-empty" class="text-center py-5" style="display:none">
                                <p class="lead mb-4">Your cart is empty.</p>
                                <a href="shop.html" class="btn btn-primary btn-lg">Continue Shopping</a>
                            </div>
                            <div id="sm-cart-content" style="display:none">
                                <div class="table-responsive">
                                    <table class="table table-hover mb-0">
                                        <thead class="thead-light">
                                            <tr>
                                                <th class="text-center" style="width:40px">
                                                    <input type="checkbox" id="sm-select-all" class="form-check-input">
                                                </th>
                                                <th>&nbsp;</th>
                                                <th>Product</th>
                                                <th>Price</th>
                                                <th>Quantity</th>
                                                <th>Total</th>
                                                <th class="text-center" style="width:60px">
                                                    <button class="btn btn-sm btn-danger" id="sm-remove-selected" title="Remove Selected">
                                                        <span class="icon-trash-o"></span>
                                                    </button>
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody id="sm-cart-items"></tbody>
                                    </table>
                                </div>
                                <div class="row p-4">
                                    <div class="col-md-6 mb-3 mb-md-0">
                                        <a href="shop.html" class="btn btn-outline-primary btn-sm">&larr; Continue Shopping</a>
                                        <button class="btn btn-outline-danger btn-sm ml-2" id="sm-clear-cart">Clear Cart</button>
                                    </div>
                                    <div class="col-md-6 text-right">
                                        <div id="sm-cart-totals">
                                            <div class="d-flex justify-content-between mb-1"><span>Subtotal:</span> <strong id="sm-total-subtotal">₹0.00</strong></div>
                                            <div class="d-flex justify-content-between mb-1" id="sm-row-discount" style="display:none"><span class="text-success">Discount:</span> <strong class="text-success" id="sm-total-discount">-₹0.00</strong></div>
                                            <div class="d-flex justify-content-between mb-1"><span>Delivery:</span> <strong id="sm-total-delivery">₹0.00</strong></div>
                                            <hr class="my-1">
                                            <div class="d-flex justify-content-between mb-3"><span class="h5 font-weight-bold">Total:</span> <strong class="h5 font-weight-bold" id="sm-total-final">₹0.00</strong></div>
                                        </div>
                                        <a href="checkout.html" class="btn btn-primary btn-lg py-2 btn-block">Proceed To Checkout</a>
                                        <div class="mt-3">
                                            <span class="small text-muted">We accept:</span>
                                            <div id="sm-payment-icons" class="d-flex justify-content-end mt-1" style="gap:12px">
                                                <svg viewBox="0 0 50 30" width="50" height="30" style="border-radius:3px"><rect width="50" height="30" fill="#1a1f71" rx="4"/><text x="7" y="19" fill="white" font-family="Arial" font-weight="bold" font-size="9">VISA</text></svg>
                                                <svg viewBox="0 0 50 30" width="50" height="30" style="border-radius:3px"><rect width="50" height="30" fill="#eb001b" rx="4"/><text x="5" y="19" fill="white" font-family="Arial" font-weight="bold" font-size="7">Master</text><circle cx="25" cy="15" r="5" fill="#f79e1b"/></svg>
                                                <svg viewBox="0 0 50 30" width="50" height="30" style="border-radius:3px"><rect width="50" height="30" fill="#6c2bd9" rx="4"/><text x="8" y="18" fill="white" font-family="Arial" font-weight="bold" font-size="12">UPI</text></svg>
                                                <svg viewBox="0 0 50 30" width="50" height="30" style="border-radius:3px"><rect width="50" height="30" fill="#4caf50" rx="4"/><text x="2" y="13" fill="white" font-family="Arial" font-weight="bold" font-size="6.5">CASH ON</text><text x="5" y="22" fill="white" font-family="Arial" font-weight="bold" font-size="6.5">DELIVERY</text></svg>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div data-sm-footer></div>
</div>
<script src="js/jquery-3.3.1.min.js"></script>
<script src="js/jquery-ui.js"></script>
<script src="js/popper.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/owl.carousel.min.js"></script>
<script src="js/jquery.magnific-popup.min.js"></script>
<script src="js/aos.js"></script>
<script src="js/main.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var SM = window.ShopMax;
  var loadingEl = document.getElementById('sm-cart-loading');
  var emptyEl = document.getElementById('sm-cart-empty');
  var contentEl = document.getElementById('sm-cart-content');
  var itemsEl = document.getElementById('sm-cart-items');
  var totalSubtotalEl = document.getElementById('sm-total-subtotal');
  var totalDiscountEl = document.getElementById('sm-total-discount');
  var totalDeliveryEl = document.getElementById('sm-total-delivery');
  var totalFinalEl = document.getElementById('sm-total-final');
  var rowDiscountEl = document.getElementById('sm-row-discount');
  var selectAll = document.getElementById('sm-select-all');
  var removeSelectedBtn = document.getElementById('sm-remove-selected');
  var clearCartBtn = document.getElementById('sm-clear-cart');

  var allItems = [];
  var selectedIds = new Set();

  function fmt(n) { return '\u20B9' + Number(n || 0).toFixed(2); }

  function calcDelivery(subtotal) {
    if (subtotal < 500) return 50;
    if (subtotal < 1000) return 30;
    return 0;
  }

  function render() {
    if (allItems.length === 0) {
      contentEl.style.display = 'none';
      loadingEl.style.display = 'none';
      emptyEl.style.display = '';
      return;
    }
    contentEl.style.display = '';
    loadingEl.style.display = 'none';
    emptyEl.style.display = 'none';

    var subtotal = allItems.reduce(function (s, i) { return s + Number(i.price) * Number(i.quantity); }, 0);
    var delivery = calcDelivery(subtotal);
    var finalTotal = subtotal + delivery;

    totalSubtotalEl.textContent = fmt(subtotal);
    if (delivery === 0) {
      totalDeliveryEl.innerHTML = '<span class="text-success">FREE</span>';
    } else {
      totalDeliveryEl.textContent = fmt(delivery);
    }
    rowDiscountEl.style.display = 'none';
    totalFinalEl.textContent = fmt(finalTotal);

    var html = '';
    allItems.forEach(function (item) {
      var lineTotal = Number(item.price) * Number(item.quantity);
      var id = item.unique_id || item.id;
      var checked = selectedIds.has(id) ? 'checked' : '';
      html += '<tr>' +
        '<td class="text-center align-middle"><input type="checkbox" class="form-check-input sm-item-check" value="' + id + '" ' + checked + '></td>' +
        '<td class="align-middle" style="width:80px"><img src="' + (item.image_url || 'images/cloth_1.jpg') + '" alt="" style="width:70px;height:90px;object-fit:cover;border-radius:4px"></td>' +
        '<td class="align-middle">' +
          '<strong>' + SM.escapeHtml(item.name) + '</strong>' +
          (item.size ? '<br><small class="text-muted">Size: ' + SM.escapeHtml(item.size) + '</small>' : '') +
          (item.color ? '<br><small class="text-muted">Color: ' + SM.escapeHtml(item.color) + '</small>' : '') +
        '</td>' +
        '<td class="align-middle">' + fmt(item.price) + '</td>' +
        '<td class="align-middle"><div class="input-group input-group-sm" style="max-width:110px">' +
          '<div class="input-group-prepend"><button class="btn btn-outline-secondary sm-qty-minus" data-id="' + id + '" data-step="-1">-</button></div>' +
          '<input type="text" class="form-control text-center sm-qty-input" value="' + item.quantity + '" readonly>' +
          '<div class="input-group-append"><button class="btn btn-outline-secondary sm-qty-plus" data-id="' + id + '" data-step="1">+</button></div>' +
        '</div></td>' +
        '<td class="align-middle">' + fmt(lineTotal) + '</td>' +
        '<td class="text-center align-middle"><button class="btn btn-sm btn-outline-danger sm-remove-one" data-id="' + id + '" title="Remove item"><span class="icon-close"></span></button></td>' +
      '</tr>';
    });
    itemsEl.innerHTML = html;
  }

  function loadCart() {
    SM.api('/api/cart').then(function (cart) {
      allItems = cart.items || [];
      selectedIds.clear();
      render();
      SM.updateCartCount && SM.updateCartCount();
    }).catch(function () {
      loadingEl.textContent = 'Failed to load cart.';
    });
  }

  function removeItems(ids) {
    Promise.all(ids.map(function (id) {
      return SM.api('/api/cart/' + id, { method: 'DELETE' });
    })).then(function () {
      loadCart();
    }).catch(function () { loadCart(); });
  }

  // Event delegation
  itemsEl.addEventListener('click', function (e) {
    var target = e.target.closest('button');
    if (!target) return;

    var id = target.getAttribute('data-id');

    if (target.classList.contains('sm-remove-one')) {
      if (!id) return;
      removeItems([id]);
      return;
    }

    if (target.classList.contains('sm-qty-minus') || target.classList.contains('sm-qty-plus')) {
      if (!id) return;
      var step = parseInt(target.getAttribute('data-step'), 10) || 0;
      var item = allItems.find(function (i) { return (i.unique_id || i.id) == id; });
      if (!item) return;
      var newQty = (Number(item.quantity) || 1) + step;
      if (newQty < 1) { removeItems([id]); return; }
      if (newQty > 10) return;
      SM.api('/api/cart/' + id, {
        method: 'PATCH',
        body: JSON.stringify({ quantity: newQty })
      }).then(function () { loadCart(); }).catch(function () { loadCart(); });
    }
  });

  // Checkbox delegation
  itemsEl.addEventListener('change', function (e) {
    if (e.target.classList.contains('sm-item-check')) {
      var id = e.target.value;
      if (e.target.checked) selectedIds.add(id);
      else selectedIds.delete(id);
    }
  });

  // Select all
  selectAll.addEventListener('change', function () {
    var checkboxes = itemsEl.querySelectorAll('.sm-item-check');
    checkboxes.forEach(function (cb) {
      cb.checked = selectAll.checked;
      var id = cb.value;
      if (selectAll.checked) selectedIds.add(id);
      else selectedIds.delete(id);
    });
  });

  // Remove selected
  removeSelectedBtn.addEventListener('click', function () {
    if (selectedIds.size === 0) return;
    removeItems(Array.from(selectedIds));
  });

  // Clear cart
  clearCartBtn.addEventListener('click', function () {
    if (allItems.length === 0) return;
    var ids = allItems.map(function (i) { return i.unique_id || i.id; });
    removeItems(ids);
  });

  loadCart();
});
</script>
</body>
</html>
