<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Register &mdash; ShopMax</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Mukta:300,400,700">
    <link rel="stylesheet" href="fonts/icomoon/style.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/magnific-popup.css">
    <link rel="stylesheet" href="css/jquery-ui.css">
    <link rel="stylesheet" href="css/owl.carousel.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">
    <link rel="stylesheet" href="css/aos.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">
  </head>
  <body>

  <div class="site-wrap">

    <div class="site-section sm-auth-section">
      <div class="container">
        <div class="row">
          <div class="col-md-12 text-center">
            <h2 class="h3 mb-2 text-uppercase sm-auth-title">Create Your Account</h2>
            <p class="sm-auth-subtitle">Join ShopMax and start customizing.</p>
          </div>
        </div>
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-5">
            <div class="sm-auth-card">
              <form id="sm-register-form" autocomplete="off">
                <div id="sm-register-error" class="alert alert-danger d-none"></div>
                <div class="form-group">
                  <label for="reg-email" class="text-black">Email <span class="text-danger">*</span></label>
                  <input type="email" id="reg-email" class="form-control" required>
                </div>
                <div class="form-group">
                  <label for="reg-name" class="text-black">Full Name</label>
                  <input type="text" id="reg-name" class="form-control">
                </div>
                <div class="form-group">
                  <label for="reg-birthdate" class="text-black">Birthdate</label>
                  <input type="date" id="reg-birthdate" class="form-control">
                </div>
                <div class="form-group">
                  <label for="reg-mobile" class="text-black">Mobile No <span class="text-danger">*</span></label>
                  <input type="tel" id="reg-mobile" class="form-control" required>
                </div>
                <div class="form-group">
                  <label for="reg-password" class="text-black">Password <span class="text-danger">*</span></label>
                  <input type="password" id="reg-password" class="form-control" minlength="8" required placeholder="At least 8 characters">
                </div>
                <div class="form-group">
                  <button type="submit" class="btn btn-black btn-block rounded-0">Register</button>
                </div>
                <div class="text-center">
                  <p class="text-muted">Already have an account? <a href="/login.html">Log in</a></p>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="sm-auth-footer">
      <p>Copyright &copy;<script>document.write(new Date().getFullYear());</script> ShopMax. All rights reserved.</p>
    </div>
  </div>

  <script src="js/jquery-3.3.1.min.js"></script>
  <script src="js/jquery-ui.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/owl.carousel.min.js"></script>
  <script src="js/jquery.magnific-popup.min.js"></script>
  <script src="js/aos.js"></script>
  <script src="js/main.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('sm-register-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var errEl = document.getElementById('sm-register-error');
      errEl.classList.add('d-none');
      var email = document.getElementById('reg-email').value.trim();
      var name = document.getElementById('reg-name').value.trim();
      var birthdate = document.getElementById('reg-birthdate').value;
      var mobile = document.getElementById('reg-mobile').value.trim();
      var password = document.getElementById('reg-password').value;
      if (password.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.classList.remove('d-none');
        return;
      }
      window.ShopMax.api('/api/auth/signup', {
        method: 'POST',
        body: JSON.stringify({ email: email, password: password, full_name: name, mobile: mobile, birthdate: birthdate })
      }).then(function (res) {
        window.location.href = '/index.html';
      }).catch(function (err) {
        errEl.textContent = err.message || 'Registration failed.';
        errEl.classList.remove('d-none');
      });
    });
  </script>

  </body>
</html>
