<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Login &mdash; ShopMax</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Mukta:300,400,700">
    <link rel="stylesheet" href="fonts/icomoon/style.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/magnific-popup.css">
    <link rel="stylesheet" href="css/jquery-ui.css">
    <link rel="stylesheet" href="css/owl.carousel.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">
    <link rel="stylesheet" href="css/aos.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">
  </head>
  <body>

  <div class="site-wrap">

    <div class="site-section sm-auth-section">
      <div class="container">
        <div class="row">
          <div class="col-md-12 text-center">
            <h2 class="h3 mb-2 text-uppercase sm-auth-title">Log In</h2>
            <p class="sm-auth-subtitle">Welcome back to ShopMax.</p>
          </div>
        </div>
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-5">
            <div class="sm-auth-card">

              <ul class="nav nav-tabs sm-tabs justify-content-center" id="loginTab" role="tablist">
                <li class="nav-item">
                  <a class="nav-link active" id="email-tab" data-toggle="tab" href="#email-login" role="tab">Email</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" id="mobile-tab" data-toggle="tab" href="#mobile-login" role="tab">Mobile No</a>
                </li>
              </ul>

              <div class="tab-content" id="loginTabContent">
                <!-- Email Login -->
                <div class="tab-pane fade show active" id="email-login" role="tabpanel">
                  <form id="sm-login-email-form" autocomplete="off">
                    <div id="sm-login-error" class="alert alert-danger d-none"></div>
                    <div class="form-group">
                      <label for="login-email" class="text-black">Email <span class="text-danger">*</span></label>
                      <input type="email" id="login-email" class="form-control" required>
                    </div>
                    <div class="form-group">
                      <label for="login-email-password" class="text-black">Password <span class="text-danger">*</span></label>
                      <input type="password" id="login-email-password" class="form-control" required>
                    </div>
                    <div class="form-group">
                      <button type="submit" class="btn btn-black btn-block rounded-0">Log In</button>
                    </div>
                  </form>
                </div>

                <!-- Mobile Login -->
                <div class="tab-pane fade" id="mobile-login" role="tabpanel">
                  <form id="sm-login-mobile-form" autocomplete="off">
                    <div id="sm-login-mobile-error" class="alert alert-danger d-none"></div>
                    <div class="form-group">
                      <label for="login-mobile" class="text-black">Mobile No <span class="text-danger">*</span></label>
                      <input type="tel" id="login-mobile" class="form-control" required>
                    </div>
                    <div class="form-group">
                      <label for="login-mobile-password" class="text-black">Password <span class="text-danger">*</span></label>
                      <input type="password" id="login-mobile-password" class="form-control" required>
                    </div>
                    <div class="form-group">
                      <button type="submit" class="btn btn-black btn-block rounded-0">Log In</button>
                    </div>
                  </form>
                </div>
              </div>

              <div class="text-center">
                <p class="text-muted">Don't have an account? <a href="/register.html">Sign up</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="sm-auth-footer">
      <p>Copyright &copy;<script>document.write(new Date().getFullYear());</script> ShopMax. All rights reserved.</p>
    </div>
  </div>

  <script src="js/jquery-3.3.1.min.js"></script>
  <script src="js/jquery-ui.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/owl.carousel.min.js"></script>
  <script src="js/jquery.magnific-popup.min.js"></script>
  <script src="js/aos.js"></script>
  <script src="js/main.js"></script>
  <script src="js/app.js"></script>
  <script>
    // email login
    document.getElementById('sm-login-email-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var errEl = document.getElementById('sm-login-error');
      errEl.classList.add('d-none');
      var email = document.getElementById('login-email').value.trim();
      var password = document.getElementById('login-email-password').value;
      window.ShopMax.api('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email: email, password: password })
      }).then(function (res) {
        var next = window.ShopMax.qs('next') || '/index.html';
        window.location.href = next;
      }).catch(function (err) {
        errEl.textContent = err.message || 'Login failed.';
        errEl.classList.remove('d-none');
      });
    });

    // mobile login
    document.getElementById('sm-login-mobile-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var errEl = document.getElementById('sm-login-mobile-error');
      errEl.classList.add('d-none');
      var mobile = document.getElementById('login-mobile').value.trim();
      var password = document.getElementById('login-mobile-password').value;
      window.ShopMax.api('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({ mobile: mobile, password: password })
      }).then(function (res) {
        var next = window.ShopMax.qs('next') || '/index.html';
        window.location.href = next;
      }).catch(function (err) {
        errEl.textContent = err.message || 'Login failed.';
        errEl.classList.remove('d-none');
      });
    });
  </script>

  </body>
</html>
