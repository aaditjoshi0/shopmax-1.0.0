<!DOCTYPE html>
<html lang="en">
  <head>
    <title>ShopMax &mdash; Shop</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Mukta:300,400,700"> 
    <link rel="stylesheet" href="fonts/icomoon/style.css">

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/magnific-popup.css">
    <link rel="stylesheet" href="css/jquery-ui.css">
    <link rel="stylesheet" href="css/owl.carousel.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">

    <link rel="stylesheet" href="css/aos.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">

  </head>
  <body>
  
  <div class="site-wrap">
    
    <div data-sm-navbar></div>
    
    <div class="site-blocks-cover inner-page" data-aos="fade">
      <div class="container">
        <div class="row">
          <div class="col-md-6 ml-auto order-md-2 align-self-start">
            <div class="site-block-cover-content">
            <h2 class="sub-title">#New Summer Collection 2019</h2>
            <h1>Arrivals Sales</h1>
            <p><a href="#" class="btn btn-black rounded-0">Shop Now</a></p>
            </div>
          </div>
          <div class="col-md-6 order-1 align-self-end">
            <img src="images/model_4.png" alt="Image" class="img-fluid">
          </div>
        </div>
      </div>
    </div>

    <div class="custom-border-bottom py-3">
      <div class="container">
        <div class="row">
          <div class="col-md-12 mb-0"><a href="index.html">Home</a> <span class="mx-2 mb-0">/</span> <strong class="text-black">Shop</strong></div>
        </div>
      </div>
    </div>

    <div class="site-section">
      <div class="container">
        <div class="row mb-5">
          <div class="col-md-9 order-1">

            <div class="row align">
              <div class="col-md-12 mb-5">
                <div class="float-md-left"><h2 class="text-black h5" id="sm-shop-title">Shop All</h2></div>
                <div class="d-flex">
                  <div class="mr-1 ml-md-auto">
                    <select id="sm-category-filter" class="form-control form-control-sm">
                      <option value="">All Categories</option>
                      <option value="men">Men</option>
                      <option value="women">Women</option>
                      <option value="home">Home</option>
                    </select>
                  </div>
                  <div>
                    <select id="sm-sort-filter" class="form-control form-control-sm">
                      <option value="">Latest</option>
                      <option value="price-asc">Price: Low to High</option>
                      <option value="price-desc">Price: High to Low</option>
                      <option value="rating">Top Rated</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <div class="row mb-5" id="sm-product-grid">
              <div class="col-12 sm-loading">Loading products...</div>
            </div>

          </div>

          <div class="col-md-3 order-2 mb-5 mb-md-0">
            <div class="border p-4 rounded mb-4">
              <h3 class="mb-3 h6 text-uppercase text-black d-block">Categories</h3>
              <ul class="list-unstyled mb-0" id="sm-category-counts">
                <li class="mb-1"><a href="#" class="d-flex cat-link" data-cat="men"><span>Men</span></a></li>
                <li class="mb-1"><a href="#" class="d-flex cat-link" data-cat="women"><span>Women</span></a></li>
                <li class="mb-1"><a href="#" class="d-flex cat-link" data-cat="home"><span>Home</span></a></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div data-sm-footer></div>
  </div>

  <script src="js/jquery-3.3.1.min.js"></script>
  <script src="js/jquery-ui.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/owl.carousel.min.js"></script>
  <script src="js/jquery.magnific-popup.min.js"></script>
  <script src="js/aos.js"></script>

  <script src="js/main.js"></script>
  <script src="js/app.js"></script>
  <script>
  (function() {
    var SM = window.ShopMax;
    var grid = document.getElementById('sm-product-grid');
    var catFilter = document.getElementById('sm-category-filter');
    var sortFilter = document.getElementById('sm-sort-filter');
    var titleEl = document.getElementById('sm-shop-title');
    var categoryCounts = {};

    function buildProductCard(p) {
      var stock = p.stock || 0;
      var stockHtml = '';
      if (stock === 0) {
        stockHtml = '<span class="sm-stock-badge sm-out-of-stock">OUT OF STOCK</span>';
      } else if (stock <= 5) {
        stockHtml = '<span class="sm-stock-badge sm-low-stock">Only ' + stock + ' left!</span>';
      } else if (stock <= 15) {
        stockHtml = '<span class="sm-stock-badge sm-mid-stock">' + stock + ' in stock</span>';
      }
      return '' +
        '<div class="col-lg-4 col-md-6 item-entry mb-4 sm-product-card" data-stock="' + stock + '">' +
          '<a href="/product/' + p.id + '" class="product-item md-height bg-gray d-block' + (stock === 0 ? ' sm-product-oos' : '') + '">' +
            '<img src="' + p.image_url + '" alt="' + SM.escapeHtml(p.name) + '" class="img-fluid">' +
            (stock === 0 ? '<div class="sm-oos-overlay">OUT OF STOCK</div>' : '') +
          '</a>' +
          '<h2 class="item-title"><a href="/product/' + p.id + '">' + SM.escapeHtml(p.name) + '</a></h2>' +
          SM.priceHtml(p) +
          (stock === 0
            ? '<span class="sm-stock-label sm-out-of-stock">Out of Stock</span>'
            : stock <= 5
              ? '<span class="sm-stock-label sm-low-stock">Only ' + stock + ' left</span>'
              : '') +
          (p.rating ? SM.ratingDisplayHtml(p.rating, p.rating_count) : '') +
        '</div>';
    }

    function loadProducts() {
      var cat = catFilter.value;
      var sort = sortFilter.value;
      var params = [];
      if (cat) params.push('category=' + cat);
      if (sort) params.push('sort=' + sort);
      var url = '/api/products' + (params.length ? '?' + params.join('&') : '');

      grid.innerHTML = '<div class="col-12 sm-loading">Loading products...</div>';

      SM.api(url).then(function(products) {
        if (!products || products.length === 0) {
          grid.innerHTML = '<div class="col-12 sm-empty"><span class="icon icon-search"></span><h3>No products found</h3></div>';
          return;
        }
        grid.innerHTML = products.map(buildProductCard).join('');
        updateCategoryCounts(products);
      }).catch(function(err) {
        grid.innerHTML = '<div class="col-12 sm-empty"><h3>Error loading products</h3><p>' + SM.escapeHtml(err.message) + '</p></div>';
      });
    }

    function updateCategoryCounts(products) {
      categoryCounts = { men: 0, women: 0, home: 0 };
      products.forEach(function(p) {
        if (categoryCounts[p.category] !== undefined) categoryCounts[p.category]++;
      });
      var links = document.querySelectorAll('.cat-link');
      links.forEach(function(a) {
        var cat = a.getAttribute('data-cat');
        var span = a.querySelector('span');
        var count = categoryCounts[cat] || 0;
        span.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        var countEl = a.querySelector('.sm-cat-count');
        if (!countEl) {
          countEl = document.createElement('span');
          countEl.className = 'text-black ml-auto sm-cat-count';
          a.appendChild(countEl);
        }
        countEl.textContent = '(' + count + ')';
      });
    }

    catFilter.addEventListener('change', loadProducts);
    sortFilter.addEventListener('change', loadProducts);

    document.querySelectorAll('.cat-link').forEach(function(a) {
      a.addEventListener('click', function(e) {
        e.preventDefault();
        catFilter.value = this.getAttribute('data-cat');
        loadProducts();
      });
    });

    loadProducts();
  })();
  </script>

  </body>
</html>
